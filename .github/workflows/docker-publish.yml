name: Build and Publish Docker Container to GHCR

# Trigger mechanism: runs automatically on new GitHub Release publications,
# and supports manual triggering via the Actions tab for testing.
on:
  release:
    types: [published]
  workflow_dispatch:

env:
  # Target registry: GitHub Container Registry (GHCR)
  REGISTRY: ghcr.io
  # Image name: automatically matches the lowercase repository name (e.g. google/multi-cast)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout repository codebase and read Dockerfile context.
      contents: read
      # Required to push container images to GitHub Packages container registry.
      packages: write
      # Required for OIDC JWT authentication token generation.
      id-token: write

    steps:
      # 1. Checkout current repository codebase.
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      # 2. Configure QEMU multi-architecture support.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Configure Docker Buildx advanced build cache and accelerator.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Authenticate with GitHub Container Registry using the built-in GITHUB_TOKEN.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Extract and format semantic Docker metadata and tags.
      - name: Extract Docker Metadata & Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Semantic versioning tag on Release (e.g. v1.0.0)
            type=semver,pattern={{version}}
            # Latest tag for default branch stability
            type=raw,value=latest,enable={{is_default_branch}}
            # Git commit SHA tag for branch builds and manual dispatches
            type=sha

      # 6. Build container image via Buildx and push directly to GHCR.
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable GitHub Actions multi-layer build cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
